<!DOCTYPE html>
<html>

<head>

<title>Vacantes para Alfonso Ramirez</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

h1{
color:#333;
}

table{
background:white;
border-collapse:collapse;
width:100%;
}

td,th{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#333;
color:white;
}

a{
color:blue;
}

</style>

</head>

<body>

<h1>Vacantes recomendadas para mi perfil</h1>
<h3>Ingeniero Industrial | Logística | Supply Chain</h3>

<table id="jobs">

<tr>
<th>Vacante</th>
<th>Empresa</th>
<th>Ciudad</th>
<th>Sueldo</th>
<th>Aplicar</th>
</tr>

</table>

<script>

fetch("jobs.json")
.then(response => response.json())
.then(data => {

let table = document.getElementById("jobs")

data.forEach(job => {

let row = table.insertRow()

row.insertCell(0).innerText = job.vacante
row.insertCell(1).innerText = job.empresa
row.insertCell(2).innerText = job.ciudad
row.insertCell(3).innerText = job.sueldo

let link = document.createElement("a")
link.href = job.link
link.innerText = "Ver vacante"

row.insertCell(4).appendChild(link)

})

})

</script>

</body>

</html>
